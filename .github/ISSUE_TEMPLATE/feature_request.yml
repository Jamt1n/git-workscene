name: Feature request
description: Suggest a workflow or interaction improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: workflow
    attributes:
      label: Workflow
      description: What job are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Git Workscene do?
    validations:
      required: true
