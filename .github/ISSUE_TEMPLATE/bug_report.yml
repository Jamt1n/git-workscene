name: Bug report
description: Report a reproducible Git Workscene problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: List the steps needed to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Windows 11, Ubuntu 22.04
