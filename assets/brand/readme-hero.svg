    <text x="560" y="360" fill="#F5F1E8" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">stale-review</text>
    <text x="560" y="390" fill="#B8B0A2" font-family="Inter, Arial, sans-serif" font-size="17">prunable</text>
  </g>
  <g>
    <rect x="946" y="60" width="178" height="104" rx="14" fill="#21181A" stroke="#B34761"/>
    <text x="970" y="96" fill="#AFA699" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">BRANCH</text>
    <text x="970" y="130" fill="#F5F1E8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">main</text>
    <rect x="946" y="196" width="178" height="104" rx="14" fill="#21181A" stroke="#B34761"/>
    <text x="970" y="232" fill="#AFA699" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">BRANCH</text>
    <text x="970" y="266" fill="#F5F1E8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">hotfix</text>
    <rect x="946" y="332" width="178" height="104" rx="14" fill="#21181A" stroke="#B34761"/>
    <text x="970" y="368" fill="#AFA699" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">BRANCH</text>
    <text x="970" y="402" fill="#F5F1E8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">agent-task</text>
  </g>
  <text x="92" y="82" fill="#63D6B5" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="2">GIT WORKSCENE</text>
  <text x="92" y="122" fill="#F5F1E8" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">Map local Git work like a control room.</text>
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(620 230) rotate(90) scale(390 720)">
      <stop stop-color="#1F2B25"/>
      <stop offset="1" stop-color="#11100E" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="0" y="0" width="1200" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
</svg>
