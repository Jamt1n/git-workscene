<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Git Workscene workspace graph</title>
  <desc id="desc">A dark canvas showing repositories, worktrees, branches, and Git relationship lines.</desc>
  <rect width="1200" height="520" rx="28" fill="#11100E"/>
  <path d="M0 0h1200v520H0z" fill="url(#bg)"/>
  <g opacity=".35">
    <path d="M80 0v520M160 0v520M240 0v520M320 0v520M400 0v520M480 0v520M560 0v520M640 0v520M720 0v520M800 0v520M880 0v520M960 0v520M1040 0v520M1120 0v520" stroke="#302C26"/>
    <path d="M0 80h1200M0 160h1200M0 240h1200M0 320h1200M0 400h1200M0 480h1200" stroke="#302C26"/>
  </g>
  <g filter="url(#soft)">
    <path d="M322 246C428 246 428 145 535 145" stroke="#63D6B5" stroke-width="4"/>
