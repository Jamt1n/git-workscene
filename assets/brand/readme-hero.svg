    <text x="120" y="210" fill="#AFA699" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">REPOSITORY</text>
    <text x="120" y="248" fill="#F5F1E8" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">git-workscene</text>
    <text x="120" y="282" fill="#B8B0A2" font-family="Inter, Arial, sans-serif" font-size="18">visual Git workspace</text>
    <rect x="120" y="296" width="92" height="28" rx="14" fill="#2A2621" stroke="#514A40"/>
    <text x="140" y="316" fill="#F5F1E8" font-family="Inter, Arial, sans-serif" font-size="15">tracked</text>
  </g>
  <g>
