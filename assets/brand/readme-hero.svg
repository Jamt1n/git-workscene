    <text x="560" y="154" fill="#F5F1E8" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">feature-panel</text>
    <text x="560" y="184" fill="#B8B0A2" font-family="Inter, Arial, sans-serif" font-size="17">clean / active</text>
  </g>
  <g>
    <rect x="535" y="183" width="247" height="130" rx="16" fill="#1A211D" stroke="#2E8C75" stroke-width="2"/>
    <text x="560" y="223" fill="#AFA699" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">WORKTREE</text>
    <text x="560" y="257" fill="#F5F1E8" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">pricing-fix</text>
    <text x="560" y="287" fill="#B8B0A2" font-family="Inter, Arial, sans-serif" font-size="17">3 dirty files</text>
  </g>
  <g>
