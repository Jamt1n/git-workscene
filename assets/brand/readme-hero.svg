    <path d="M782 145C864 145 864 112 946 112" stroke="#F5F1E8" stroke-width="3" opacity=".65"/>
    <path d="M782 248C864 248 864 248 946 248" stroke="#E25D7A" stroke-width="3" opacity=".55"/>
    <path d="M782 352C864 352 864 388 946 388" stroke="#E25D7A" stroke-width="3" opacity=".55"/>
  </g>
  <g>
